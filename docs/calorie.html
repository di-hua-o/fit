<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>热量统计 · 饮食补剂管理</title>
  <link rel="stylesheet" href="../assets/css/hyperspace.css">
  <script src="../assets/js/fit-user.js"></script>
</head>
<body class="page-calorie">
  <button type="button" id="sidebar-toggle" aria-label="打开菜单">☰</button>

  <aside id="sidebar">
    <div class="logo"><a href="index.html">饮食补剂管理</a></div>
    <nav>
      <ul>
        <li><a href="profile.html">我的信息</a></li>
        <li><a href="section1.html">每日饮食与补剂</a></li>
        <li><a href="section2.html">一周饮食清单</a></li>
        <li><a href="section3.html">采购清单</a></li>
        <li><a href="section4.html">锻炼计划</a></li>
        <li><a href="calendar.html">日历</a></li>
        <li><a href="budget.html">开销统计</a></li>
        <li><a href="weight.html">体重记录</a></li>
        <li><a href="calorie.html" class="active">热量统计</a></li>
      </ul>
    </nav>
  </aside>

  <div id="wrapper">
    <div class="inner">
      <a href="index.html" class="back-link">← 返回目录</a>
      <div class="page-content">
        <h2>🔥 热量统计</h2>
        <p style="color: var(--hyperspace-fg-muted); font-size: 0.9375rem; margin-bottom: 1.5rem;">根据身高、体重与活动量估算每日消耗；根据当前餐单估算每日摄入。</p>

        <div class="card">
          <h3>身体数据（用于计算消耗）</h3>
          <p style="color: var(--hyperspace-fg-muted); font-size: 0.8125rem; margin-bottom: 0.75rem;">身高、体重可自动从「体重记录」与「身高」读取，也可手动填写。</p>
          <div class="calorie-form">
            <label><span>身高（cm）</span><input type="number" id="inputHeight" min="100" max="250" placeholder="如 175"></label>
            <label><span>体重（kg）</span><input type="number" id="inputWeight" step="0.1" min="30" max="300" placeholder="如 70"></label>
            <label><span>出生日期</span>
              <span class="calorie-birthdate-selects">
                <select id="inputBirthYear"><option value="">年</option></select>
                <select id="inputBirthMonth"><option value="">月</option></select>
                <select id="inputBirthDay"><option value="">日</option></select>
              </span>
            </label>
            <label><span>年龄</span><span id="ageDisplay" class="calorie-age-display">—</span></label>
            <label><span>性别</span><select id="inputGender"><option value="male">男</option><option value="female">女</option></select></label>
            <label><span>活动量</span>
              <select id="inputActivity">
                <option value="1.2">久坐（几乎不运动）</option>
                <option value="1.375">轻度（每周 1～3 天）</option>
                <option value="1.55" selected>中度（每周 3～5 天）</option>
                <option value="1.725">高度（每周 6～7 天）</option>
                <option value="1.9">极高（体力劳动/每天训练）</option>
              </select>
            </label>
            <button type="button" id="btnSaveBody" class="button">保存</button>
          </div>
        </div>

        <div class="card">
          <h3>每日热量消耗</h3>
          <p id="expenditureResult" class="calorie-result">请先填写并保存身体数据。</p>
          <label class="calorie-expenditure-override" style="display:block; margin-top:1rem;">
            <span style="display:block; margin-bottom:0.35rem;">当日活动消耗手动输入（kcal）</span>
            <input type="number" id="inputExpenditureOverride" min="0" max="2000" step="1" placeholder="仅替代日常活动消耗，留空则用推算值" style="max-width:12rem;">
            <span style="display:block; color:var(--hyperspace-fg-muted); font-size:0.8125rem; margin-top:0.25rem;">总消耗 = 基础代谢 + 活动消耗（不替代基础代谢）</span>
          </label>
        </div>

        <div class="card">
          <h3>每日热量摄入（按当前餐单）</h3>
          <label class="calorie-day-select"><span>选择星期</span><select id="daySelect"></select></label>
          <table class="budget-table" id="intakeTable">
            <thead><tr><th>餐次/项目</th><th class="col-price">热量（kcal）</th></tr></thead>
            <tbody id="intakeBody"></tbody>
            <tfoot><tr class="row-subtotal"><td><strong>当日合计</strong></td><td class="col-price" id="intakeTotal">—</td></tr></tfoot>
          </table>
        </div>

        <div class="card">
          <h3>摄入 vs 消耗</h3>
          <p id="balanceResult" class="calorie-result">保存身体数据并选择星期后，将显示热量平衡。</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      if (window.FitUser) window.FitUser.ensureCurrentUser();
      var KEY_HEIGHT = 'fit-height-cm';
      var KEY_WEIGHT = 'fit-weight-records';
      var KEY_BIRTHDATE = 'fit-calorie-birthdate';
      var KEY_AGE = 'fit-calorie-age';
      var KEY_GENDER = 'fit-calorie-gender';
      var KEY_ACTIVITY = 'fit-calorie-activity';
      var KEY_EXPENDITURE_OVERRIDE = 'fit-calorie-expenditure-override';

      function getHeight() {
        var h = localStorage.getItem(KEY_HEIGHT);
        return h ? parseFloat(h, 10) : null;
      }
      function getLatestWeight() {
        var override = localStorage.getItem('fit-calorie-weight-override');
        if (override) return parseFloat(override, 10);
        try {
          var raw = localStorage.getItem(KEY_WEIGHT);
          var arr = raw ? JSON.parse(raw) : [];
          if (arr.length === 0) return null;
          arr.sort(function(a, b) { return b.date.localeCompare(a.date); });
          return arr[0].weight;
        } catch (e) { return null; }
      }
      function ageFromBirthdate(dateStr) {
        if (!dateStr || dateStr.length < 10) return null;
        var b = new Date(dateStr.slice(0, 10));
        if (isNaN(b.getTime())) return null;
        var today = new Date();
        var age = today.getFullYear() - b.getFullYear();
        if (today.getMonth() < b.getMonth() || (today.getMonth() === b.getMonth() && today.getDate() < b.getDate())) age--;
        return age >= 0 && age <= 120 ? age : null;
      }
      function getAge() {
        var birth = localStorage.getItem(KEY_BIRTHDATE);
        if (birth) {
          var a = ageFromBirthdate(birth);
          if (a != null) return a;
        }
        var a = localStorage.getItem(KEY_AGE);
        return a ? parseInt(a, 10) : null;
      }
      function getAgeForCalc() {
        var dateStr = getBirthdateFromInputs();
        if (dateStr) {
          var a = ageFromBirthdate(dateStr);
          if (a != null) return a;
        }
        return getAge();
      }
      function getGender() {
        return localStorage.getItem(KEY_GENDER) || 'male';
      }
      function getActivity() {
        return parseFloat(localStorage.getItem(KEY_ACTIVITY) || '1.55', 10);
      }
      /** 获取用于平衡的当日总消耗：有有效活动消耗输入时 = BMR + 输入（仅替代活动部分）；否则 = 推算的 TDEE。无身体数据时返回 null */
      function getExpenditure() {
        var height = getHeight();
        var weight = getLatestWeight();
        var age = getAgeForCalc();
        var gender = getGender();
        var activity = getActivity();
        var b = height && weight && age ? bmr(weight, height, age, gender) : null;
        var overrideRaw = localStorage.getItem(KEY_EXPENDITURE_OVERRIDE);
        if (overrideRaw !== null && overrideRaw !== '') {
          var override = parseFloat(overrideRaw, 10);
          if (!isNaN(override) && override >= 0 && override <= 2000 && b !== null)
            return Math.round(b) + Math.round(override);
          if (!isNaN(override) && override >= 0 && override <= 2000) return null; /* 有活动输入但无 BMR，需身体数据 */
        }
        if (!height || !weight || !age) return null;
        return Math.round(b * activity);
      }

      function bmr(weight, height, age, gender) {
        if (!weight || !height || !age) return null;
        var base = 10 * weight + 6.25 * height - 5 * age;
        return gender === 'female' ? base - 161 : base + 5;
      }

      var DAY_NAMES = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
      var COMMON = [
        { name: '早餐 60g 燕麦', kcal: 228 },
        { name: '早餐 2 个白煮蛋', kcal: 310 },
        { name: '早餐 1 小盒无糖酸奶', kcal: 60 },
        { name: '早餐 半盒蓝莓', kcal: 30 },
        { name: '早餐 25g 蛋白粉', kcal: 100 },
        { name: '午餐 100g 米饭', kcal: 130 },
        { name: '午餐 蔬菜', kcal: 50 },
        { name: '睡前 30g 蛋白粉', kcal: 120 },
        { name: '睡前 15g 坚果', kcal: 90 }
      ];
      var DAY_MEALS = [
        [ { name: '午餐 2 个去皮鸡腿', kcal: 324 }, { name: '晚餐 200g 紫薯', kcal: 172 }, { name: '晚餐 150g 鸡胸肉', kcal: 170 } ],
        [ { name: '午餐 100g 瘦牛肉', kcal: 250 }, { name: '晚餐 200g 土豆', kcal: 154 }, { name: '晚餐 150g 巴沙鱼', kcal: 132 } ],
        [ { name: '午餐 150g 鸡胸肉', kcal: 170 }, { name: '晚餐 200g 红薯', kcal: 172 }, { name: '晚餐 2 个去皮鸡腿', kcal: 324 } ],
        [ { name: '午餐 150g 龙利鱼', kcal: 132 }, { name: '晚餐 200g 芋头', kcal: 224 }, { name: '晚餐 100g 瘦猪肉', kcal: 143 } ],
        [ { name: '午餐 100g 瘦猪肉', kcal: 143 }, { name: '晚餐 200g 紫薯', kcal: 172 }, { name: '晚餐 100g 瘦牛肉', kcal: 250 } ],
        [ { name: '午餐 2 个去皮鸡腿', kcal: 324 }, { name: '晚餐 200g 土豆', kcal: 154 }, { name: '晚餐 3 个白煮蛋', kcal: 465 } ],
        [ { name: '午餐 150g 巴沙鱼', kcal: 132 }, { name: '晚餐 200g 红薯', kcal: 172 }, { name: '晚餐 100g 瘦牛肉', kcal: 250 } ]
      ];

      function getDayIntake(dayIndex) {
        var list = COMMON.concat(DAY_MEALS[dayIndex]);
        var total = 0;
        list.forEach(function(item) { total += item.kcal; });
        return { items: list, total: total };
      }

      function renderExpenditure() {
        var height = getHeight();
        var weight = getLatestWeight();
        var age = getAgeForCalc();
        var gender = getGender();
        var activity = getActivity();
        var el = document.getElementById('expenditureResult');
        if (!height || !weight) {
          el.innerHTML = '请先在「体重记录」页填写身高并保存，并至少有一条体重记录；或在本页填写身高、体重后保存。';
          var rawOverride = localStorage.getItem(KEY_EXPENDITURE_OVERRIDE);
          if (rawOverride !== null && rawOverride !== '' && !isNaN(parseFloat(rawOverride, 10))) {
            el.innerHTML += '<br><span style="color:var(--hyperspace-fg-muted); font-size:0.9em;">已输入活动消耗。填写身体数据后，总消耗 = 基础代谢 + 活动消耗。</span>';
          }
          return;
        }
        if (!age) {
          el.innerHTML = '请选择出生日期并保存。当前身高 ' + height + ' cm，体重 ' + weight + ' kg。';
          var rawOverride = localStorage.getItem(KEY_EXPENDITURE_OVERRIDE);
          if (rawOverride !== null && rawOverride !== '' && !isNaN(parseFloat(rawOverride, 10))) {
            el.innerHTML += '<br><span style="color:var(--hyperspace-fg-muted); font-size:0.9em;">已输入活动消耗。填写身体数据后，总消耗 = 基础代谢 + 活动消耗。</span>';
          }
          return;
        }
        var b = Math.round(bmr(weight, height, age, gender));
        var tdee = Math.round(b * activity);
        var used = getExpenditure();
        var rawOverride = localStorage.getItem(KEY_EXPENDITURE_OVERRIDE);
        var hasOverride = rawOverride !== null && rawOverride !== '' && !isNaN(parseFloat(rawOverride, 10));
        var activityPart = hasOverride ? Math.round(parseFloat(rawOverride, 10)) : (tdee - b);
        el.innerHTML = '基础代谢（BMR）约 <strong>' + b + '</strong> kcal/天；<br>每日总消耗（TDEE）约 <strong>' + tdee + '</strong> kcal/天（按当前活动量）。';
        if (used !== null) {
          el.innerHTML += '<br><span style="color:var(--hyperspace-fg-muted); font-size:0.9em;">当前用于平衡的消耗：<strong>' + used + '</strong> kcal/天' + (hasOverride ? '（基础代谢 ' + b + ' + 活动 ' + activityPart + ' kcal，已手动输入活动）' : '（推算值）') + '</span>';
        }
      }

      function renderIntake() {
        var dayIndex = parseInt(document.getElementById('daySelect').value, 10);
        var data = getDayIntake(dayIndex);
        var tbody = document.getElementById('intakeBody');
        tbody.innerHTML = '';
        data.items.forEach(function(item) {
          var tr = document.createElement('tr');
          tr.innerHTML = '<td>' + item.name + '</td><td class="col-price">' + item.kcal + '</td>';
          tbody.appendChild(tr);
        });
        document.getElementById('intakeTotal').textContent = data.total;
        renderBalance(data.total);
      }

      function renderBalance(intake) {
        var el = document.getElementById('balanceResult');
        var expenditure = getExpenditure();
        if (expenditure === null) {
          var rawOverride = localStorage.getItem(KEY_EXPENDITURE_OVERRIDE);
          if (rawOverride !== null && rawOverride !== '' && !isNaN(parseFloat(rawOverride, 10)))
            el.textContent = '已输入活动消耗。请先填写并保存身体数据，以便计算总消耗（基础代谢 + 活动）。';
          else
            el.textContent = '请先保存身体数据。';
          return;
        }
        var diff = intake - expenditure;
        var text = '摄入 <strong>' + intake + '</strong> kcal，消耗约 <strong>' + expenditure + '</strong> kcal。';
        if (diff > 0) text += ' 当日盈余 <strong style="color:#f87171">+' + diff + '</strong> kcal。';
        else if (diff < 0) text += ' 当日赤字 <strong style="color:#34d399">' + diff + '</strong> kcal。';
        else text += ' 收支平衡。';
        el.innerHTML = text;
      }

      var daySelect = document.getElementById('daySelect');
      DAY_NAMES.forEach(function(name, i) {
        var opt = document.createElement('option');
        opt.value = i;
        opt.textContent = name;
        daySelect.appendChild(opt);
      });

      var birthYearEl = document.getElementById('inputBirthYear');
      var birthMonthEl = document.getElementById('inputBirthMonth');
      var birthDayEl = document.getElementById('inputBirthDay');
      var curYear = new Date().getFullYear();
      for (var y = curYear; y >= curYear - 120; y--) {
        var o = document.createElement('option');
        o.value = y;
        o.textContent = y + ' 年';
        birthYearEl.appendChild(o);
      }
      for (var m = 1; m <= 12; m++) {
        var o = document.createElement('option');
        o.value = m;
        o.textContent = m + ' 月';
        birthMonthEl.appendChild(o);
      }
      for (var d = 1; d <= 31; d++) {
        var o = document.createElement('option');
        o.value = d;
        o.textContent = d + ' 日';
        birthDayEl.appendChild(o);
      }

      function getBirthdateFromInputs() {
        var y = birthYearEl.value;
        var m = birthMonthEl.value;
        var d = birthDayEl.value;
        if (!y || !m || !d) return '';
        var year = parseInt(y, 10);
        var month = parseInt(m, 10);
        var day = parseInt(d, 10);
        var maxDay = new Date(year, month, 0).getDate();
        if (day > maxDay) day = maxDay;
        var ms = ('0' + month).slice(-2);
        var ds = ('0' + day).slice(-2);
        return year + '-' + ms + '-' + ds;
      }
      function setBirthdateToInputs(dateStr) {
        if (!dateStr || dateStr.length < 10) return;
        var parts = dateStr.slice(0, 10).split('-');
        if (parts.length !== 3) return;
        birthYearEl.value = parts[0];
        birthMonthEl.value = String(parseInt(parts[1], 10));
        birthDayEl.value = String(parseInt(parts[2], 10));
      }

      function updateAgeDisplay() {
        var dateStr = getBirthdateFromInputs();
        var age = dateStr ? ageFromBirthdate(dateStr) : getAge();
        var el = document.getElementById('ageDisplay');
        el.textContent = age != null ? age + ' 岁' : '—';
      }

      function onBirthdateChange() {
        updateAgeDisplay();
        renderExpenditure();
        renderBalance(getDayIntake(parseInt(daySelect.value, 10)).total);
      }

      document.getElementById('inputHeight').value = getHeight() || '';
      document.getElementById('inputWeight').value = getLatestWeight() || '';
      var inputExpOverride = document.getElementById('inputExpenditureOverride');
      inputExpOverride.value = localStorage.getItem(KEY_EXPENDITURE_OVERRIDE) || '';
      inputExpOverride.addEventListener('input', function() {
        var v = this.value.trim();
        if (v === '') {
          localStorage.removeItem(KEY_EXPENDITURE_OVERRIDE);
        } else {
          var n = parseFloat(v, 10);
          if (!isNaN(n) && n >= 0 && n <= 2000) localStorage.setItem(KEY_EXPENDITURE_OVERRIDE, String(Math.round(n)));
        }
        if (window.FitUser) window.FitUser.saveWorkingToCurrentUser();
        renderExpenditure();
        renderBalance(getDayIntake(parseInt(daySelect.value, 10)).total);
      });
      inputExpOverride.addEventListener('blur', function() {
        var v = this.value.trim();
        if (v === '') return;
        var n = parseFloat(v, 10);
        if (isNaN(n) || n < 0 || n > 2000) this.value = localStorage.getItem(KEY_EXPENDITURE_OVERRIDE) || '';
      });

      var savedBirth = localStorage.getItem(KEY_BIRTHDATE);
      setBirthdateToInputs(savedBirth || '');
      updateAgeDisplay();
      document.getElementById('inputGender').value = getGender();
      document.getElementById('inputActivity').value = String(getActivity());

      birthYearEl.addEventListener('change', onBirthdateChange);
      birthMonthEl.addEventListener('change', onBirthdateChange);
      birthDayEl.addEventListener('change', onBirthdateChange);

      document.getElementById('btnSaveBody').addEventListener('click', function() {
        var h = parseFloat(document.getElementById('inputHeight').value, 10);
        var w = parseFloat(document.getElementById('inputWeight').value, 10);
        var birth = getBirthdateFromInputs();
        var g = document.getElementById('inputGender').value;
        var act = document.getElementById('inputActivity').value;
        if (h && h >= 100 && h <= 250) localStorage.setItem(KEY_HEIGHT, String(h));
        if (w && w >= 30 && w <= 300) localStorage.setItem('fit-calorie-weight-override', String(w));
        if (birth && birth.length >= 10) localStorage.setItem(KEY_BIRTHDATE, birth.slice(0, 10));
        localStorage.setItem(KEY_GENDER, g);
        if (act) localStorage.setItem(KEY_ACTIVITY, act);
        if (window.FitUser) window.FitUser.saveWorkingToCurrentUser();
        updateAgeDisplay();
        renderExpenditure();
        renderBalance(getDayIntake(parseInt(daySelect.value, 10)).total);
      });

      daySelect.addEventListener('change', renderIntake);

      renderExpenditure();
      renderIntake();
    })();

    (function() {
      var sidebar = document.getElementById('sidebar');
      var toggle = document.getElementById('sidebar-toggle');
      if (toggle && sidebar) {
        toggle.addEventListener('click', function() { sidebar.classList.toggle('open'); });
        document.addEventListener('click', function(e) {
          if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && !toggle.contains(e.target))
            sidebar.classList.remove('open');
        });
      }
    })();
  </script>
</body>
</html>
