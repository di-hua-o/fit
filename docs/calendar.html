<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="assets/css/hyperspace.css">
</head>
<body class="page-calendar">
  <button type="button" id="sidebar-toggle" aria-label="打开菜单">☰</button>

  <aside id="sidebar">
    <div class="logo"><a href="index.html">饮食补剂管理</a></div>
    <nav>
      <ul>
        <li><a href="profile.html">我的信息</a></li>
        <li><a href="section1.html">每日饮食与补剂</a></li>
        <li><a href="section2.html">一周饮食清单</a></li>
        <li><a href="section3.html">采购清单</a></li>
        <li><a href="section4.html">锻炼计划</a></li>
        <li><a href="calendar.html" class="active">日历</a></li>
        <li><a href="budget.html">开销统计</a></li>
        <li><a href="weight.html">体重记录</a></li>
        <li><a href="calorie.html">热量统计</a></li>
      </ul>
    </nav>
  </aside>

  <div id="wrapper">
    <div class="inner">
      <div class="page-content">
        <h2>📅 日历 · 每日饮食与训练安排</h2>
        <p style="color: var(--hyperspace-fg-muted); font-size: 0.9375rem; margin-bottom: 1.5rem;">点击某一天查看当日的饮食和训练安排。</p>

        <div class="calendar-toolbar">
          <h2 id="calendarTitle">2025年1月</h2>
          <div class="calendar-nav">
            <button type="button" id="prevMonth">上月</button>
            <button type="button" id="todayBtn">今天</button>
            <button type="button" id="nextMonth">下月</button>
          </div>
        </div>

        <div class="calendar-grid">
          <div class="calendar-weekday">日</div>
          <div class="calendar-weekday">一</div>
          <div class="calendar-weekday">二</div>
          <div class="calendar-weekday">三</div>
          <div class="calendar-weekday">四</div>
          <div class="calendar-weekday">五</div>
          <div class="calendar-weekday">六</div>
          <div id="calendarDays"></div>
        </div>

        <div id="dayDetail" class="day-detail-empty">点击上方日历中的某一天查看当日安排</div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var WEEKDAY_NAMES = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      /* getDay(): 0=周日, 1=周一, ..., 6=周六 */
      var MEALS = [
        {
          name: '周日',
          breakfast: '70g🥣燕麦 + 30g🥄蛋白粉 + 1个🥚全蛋 + 2个🥚蛋清',
          lunch: '练前餐：100g🍚生米煮饭 + 2个🍗去皮鸡腿',
          dinner: '练后餐：1根🍌香蕉 + 120g🍚生米煮饭 + 2个🍗去皮鸡腿；第四餐：300g🍜熟面条 + 150g🥩炒瘦肉；睡前餐：1个馒头 + 1个🍗去皮鸡腿',
          beforeBed: '—（已包含在训练日专用睡前餐中）',
          nut: '—'
        },
        {
          name: '周一',
          breakfast: '60g🥣燕麦 + 2🥚白煮蛋 + 1小盒🥛无糖纯酸奶 + 半盒🫐蓝莓/少量🍓草莓/一小把🍒樱桃（三选一，总量≈50g，加25g酵母蛋白粉）',
          lunch: '100g🍚米饭 + 🍗2个去皮鸡腿（清煮，黑胡椒+盐） + 🥬清炒芦笋+油麦菜',
          dinner: '200g🍠紫薯 + 🍗150g去皮鸡胸肉（水煮，蘸生抽）',
          beforeBed: '30g酵母蛋白粉 + 15g🥜杏仁',
          nut: '15g🥜杏仁'
        },
        {
          name: '周二',
          breakfast: '60g🥣燕麦 + 2🥚白煮蛋 + 1小盒🥛无糖纯酸奶 + 半盒🫐蓝莓/少量🍓草莓/一小把🍒樱桃（三选一，总量≈50g，加25g酵母蛋白粉）',
          lunch: '100g🍚米饭 + 🥩100g瘦牛肉（牛里脊，少油煎牛柳） + 🥬香菇炒菠菜',
          dinner: '200g🥔土豆 + 🐟150g巴沙鱼（清蒸，生抽+葱花）',
          beforeBed: '30g酵母蛋白粉 + 15g🥜巴旦木',
          nut: '15g🥜巴旦木'
        },
        {
          name: '周三',
          breakfast: '60g🥣燕麦 + 2🥚白煮蛋 + 1小盒🥛无糖纯酸奶 + 半盒🫐蓝莓/少量🍓草莓/一小把🍒樱桃（三选一，总量≈50g，加25g酵母蛋白粉）',
          lunch: '100g🍚米饭 + 🍗150g去皮鸡胸肉（少油快炒配香菇） + 🥬清炒生菜+芦笋',
          dinner: '200g🍠红薯 + 🍗2个去皮鸡腿（清蒸，姜片调味）',
          beforeBed: '30g酵母蛋白粉 + 15g🥜无盐原味开心果',
          nut: '15g🥜无盐原味开心果'
        },
        {
          name: '周四',
          breakfast: '60g🥣燕麦 + 2🥚白煮蛋 + 1小盒🥛无糖纯酸奶 + 半盒🫐蓝莓/少量🍓草莓/一小把🍒樱桃（三选一，总量≈50g，加25g酵母蛋白粉）',
          lunch: '100g🍚米饭 + 🐟150g龙利鱼（少油煎鱼块） + 🥬香菇炒油麦菜',
          dinner: '200g芋头 + 🥩100g瘦猪肉（猪里脊，清蒸肉片）',
          beforeBed: '30g酵母蛋白粉 + 15g🥜原味腰果',
          nut: '15g🥜原味腰果'
        },
        {
          name: '周五',
          breakfast: '60g🥣燕麦 + 2🥚白煮蛋 + 1小盒🥛无糖纯酸奶 + 半盒🫐蓝莓/少量🍓草莓/一小把🍒樱桃（三选一，总量≈50g，加25g酵母蛋白粉）',
          lunch: '100g🍚米饭 + 🥩100g瘦猪肉（猪腱子，少油炒肉丝配菠菜） + 🥬清炒芦笋+生菜',
          dinner: '200g🍠紫薯 + 🥩100g瘦牛肉（牛腱子，清炖撇浮油，仅吃肉）',
          beforeBed: '30g酵母蛋白粉 + 15g🥜原味核桃',
          nut: '15g🥜原味核桃'
        },
        {
          name: '周六',
          breakfast: '70g🥣燕麦 + 2🥚白煮蛋 + 1小盒🥛无糖纯酸奶 + 半盒🫐蓝莓/少量🍓草莓/一小把🍒樱桃（三选一，总量≈50g，加25g酵母蛋白粉）',
          lunch: '120g🍚生米煮饭 + 🍗2个去皮鸡腿（清炖加姜片，不喝浓汤） + 🥬香菇+油麦菜清炒',
          dinner: '练后餐：100g🍚生米煮饭 + 150g🥩瘦肉（牛肉/猪肉任选，清淡烹饪）；晚餐：250g🍠紫薯 + 🥩100g瘦牛肉（牛腱子，清炖撇浮油，仅吃肉）',
          beforeBed: '30g酵母蛋白粉 + 1根🍌香蕉（其余坚果可按需酌情减少或省略）',
          nut: '—（如已吃香蕉可不额外加坚果）'
        }
      ];
      var COMMON = {
        water: '每日≥4L，晨起空腹500ml温水'
      };
      var SUPPLEMENTS = [
        { name: '🐟 鱼油', dose: '2 粒', time: '早 1 粒、晚 1 粒' },
        { name: '💊 辅酶 Q10', dose: '2 粒', time: '早 1 粒、晚 1 粒' },
        { name: '🍊 维生素 C', dose: '约 1000mg（约 10 粒）', time: '中午5粒、晚上5粒' },
        { name: '💊 男士复合维生素', dose: '1 粒', time: '早上' },
        { name: '💊 甘氨酸镁', dose: '1 粒', time: '睡前' }
      ];

      var current = new Date();
      var selectedDate = null;

      function getMonthYear(d) {
        return d.getFullYear() + '年' + (d.getMonth() + 1) + '月';
      }

      function renderCalendar() {
        var y = current.getFullYear();
        var m = current.getMonth();
        document.getElementById('calendarTitle').textContent = getMonthYear(current);

        var first = new Date(y, m, 1);
        var last = new Date(y, m + 1, 0);
        var startDay = first.getDay();
        var daysInMonth = last.getDate();
        var prevMonthLast = new Date(y, m, 0).getDate();

        var html = '';
        var totalCells = startDay + daysInMonth;
        var rows = Math.ceil(totalCells / 7);
        var total = rows * 7;

        for (var i = 0; i < startDay; i++) {
          var d = prevMonthLast - startDay + 1 + i;
          html += '<div class="calendar-day other-month" data-date="' + (m === 0 ? y - 1 : y) + '-' + (m === 0 ? 12 : m) + '-' + d + '">' + d + '</div>';
        }
        for (var d = 1; d <= daysInMonth; d++) {
          var dateStr = y + '-' + (m + 1) + '-' + d;
          var cls = 'calendar-day';
          if (m === new Date().getMonth() && y === new Date().getFullYear() && d === new Date().getDate()) cls += ' today';
          if (selectedDate && selectedDate.getFullYear() === y && selectedDate.getMonth() === m && selectedDate.getDate() === d) cls += ' selected';
          html += '<div class="' + cls + '" data-date="' + dateStr + '">' + d + '</div>';
        }
        var rest = total - (startDay + daysInMonth);
        for (var j = 0; j < rest; j++) {
          html += '<div class="calendar-day other-month" data-date="' + (m === 11 ? y + 1 : y) + '-' + (m === 11 ? 1 : m + 2) + '-' + (j + 1) + '">' + (j + 1) + '</div>';
        }

        var container = document.getElementById('calendarDays');
        container.innerHTML = html;

        container.querySelectorAll('.calendar-day').forEach(function(cell) {
          cell.addEventListener('click', function() {
            var dateStr = this.getAttribute('data-date');
            var parts = dateStr.split('-');
            selectedDate = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
            showDayDetail(selectedDate);
            renderCalendar();
          });
        });
      }

      function showDayDetail(date) {
        var weekday = date.getDay();
        var meal = MEALS[weekday];
        var isWeekend = weekday === 0 || weekday === 6;

        var training;
        if (weekday === 6) {
          training = '周六：无氧（胸/背/肩 4组×15次）+ 有氧 40 分钟爬楼机，详见锻炼计划页';
        } else if (weekday === 0) {
          training = '周日：无氧（大腿前/大腿后/屁股）+ 有氧 40 分钟爬楼机，详见锻炼计划页';
        } else if (weekday === 2 || weekday === 4) {
          training = '有氧训练：30 分钟爬楼梯（周二/周四安排）';
        } else {
          training = '今日无固定训练安排';
        }

        var html = '<h3>' + date.getFullYear() + '年' + (date.getMonth() + 1) + '月' + date.getDate() + '日 ' + WEEKDAY_NAMES[weekday] + '</h3>';
        html += '<div class="detail-section"><h4>🍳 饮食安排</h4><ul>';
        html += '<li><strong>早餐</strong>：' + meal.breakfast + '</li>';
        html += '<li><strong>午餐</strong>：' + meal.lunch + '</li>';
        html += '<li><strong>晚餐/其他</strong>：' + meal.dinner + '</li>';
        html += '<li><strong>睡前加餐</strong>：' + meal.beforeBed + '</li>';
        html += '<li><strong>💧 饮水量</strong>：' + COMMON.water + '</li>';
        html += '</ul></div>';
        html += '<div class="detail-section"><h4>🏃 训练安排</h4><ul><li>' + training + '</li></ul></div>';
        html += '<div class="detail-section"><h4>💊 当日补剂</h4><ul>';
        SUPPLEMENTS.forEach(function(s) {
          html += '<li><strong>' + s.name + '</strong>：' + s.dose + '，' + s.time + '</li>';
        });
        html += '</ul></div>';

        var el = document.getElementById('dayDetail');
        el.className = 'day-detail';
        el.innerHTML = html;
      }

      document.getElementById('prevMonth').addEventListener('click', function() {
        current = new Date(current.getFullYear(), current.getMonth() - 1, 1);
        selectedDate = null;
        document.getElementById('dayDetail').className = 'day-detail-empty';
        document.getElementById('dayDetail').textContent = '点击上方日历中的某一天查看当日安排';
        renderCalendar();
      });

      document.getElementById('nextMonth').addEventListener('click', function() {
        current = new Date(current.getFullYear(), current.getMonth() + 1, 1);
        selectedDate = null;
        document.getElementById('dayDetail').className = 'day-detail-empty';
        document.getElementById('dayDetail').textContent = '点击上方日历中的某一天查看当日安排';
        renderCalendar();
      });

      document.getElementById('todayBtn').addEventListener('click', function() {
        current = new Date();
        selectedDate = new Date();
        renderCalendar();
        showDayDetail(selectedDate);
      });

      renderCalendar();
    })();

    (function() {
      var sidebar = document.getElementById('sidebar');
      var toggle = document.getElementById('sidebar-toggle');
      if (toggle && sidebar) {
        toggle.addEventListener('click', function() { sidebar.classList.toggle('open'); });
        document.addEventListener('click', function(e) {
          if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && !toggle.contains(e.target))
            sidebar.classList.remove('open');
        });
      }
    })();
  </script>
</body>
</html>
