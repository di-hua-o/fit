<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>锻炼计划 · 饮食补剂管理</title>
  <link rel="stylesheet" href="assets/css/hyperspace.css">
</head>
<body>
  <button type="button" id="sidebar-toggle" aria-label="打开菜单">☰</button>

  <aside id="sidebar">
    <div class="logo"><a href="index.html">饮食补剂管理</a></div>
    <nav>
      <ul>
        <li><a href="section1.html">每日饮食与补剂</a></li>
        <li><a href="section2.html">一周饮食清单</a></li>
        <li><a href="section3.html">采购清单</a></li>
        <li><a href="section4.html" class="active">锻炼计划</a></li>
      </ul>
    </nav>
  </aside>

  <div id="wrapper">
    <div class="inner">
      <a href="index.html" class="back-link">← 返回目录</a>
      <div class="page-content">
        <h2>四、锻炼计划</h2>

        <div class="card">
          <h3>🏃 工作日（周一至周五）</h3>
          <ul>
            <li><strong>有氧训练</strong>：每周两次，每次 30 分钟</li>
            <li><strong>方式</strong>：爬楼梯</li>
          </ul>
        </div>

        <div class="card">
          <h3>💪 周末（周六、周日）</h3>
          <ul>
            <li><strong>有氧 + 无氧锻炼</strong>：每周两次</li>
            <li><strong>详细计划</strong>：待补充</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var sidebar = document.getElementById('sidebar');
      var toggle = document.getElementById('sidebar-toggle');
      if (toggle && sidebar) {
        toggle.addEventListener('click', function() { sidebar.classList.toggle('open'); });
        document.addEventListener('click', function(e) {
          if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && !toggle.contains(e.target))
            sidebar.classList.remove('open');
        });
      }
    })();
  </script>
</body>
</html>
