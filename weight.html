<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>体重记录 · 饮食补剂管理</title>
  <link rel="stylesheet" href="assets/css/hyperspace.css">
  <script src="assets/js/fit-user.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body class="page-weight">
  <button type="button" id="sidebar-toggle" aria-label="打开菜单">☰</button>

  <aside id="sidebar">
    <div class="logo"><a href="index.html">饮食补剂管理</a></div>
    <nav>
      <ul>
        <li><a href="profile.html">我的信息</a></li>
        <li><a href="section1.html">每日饮食与补剂</a></li>
        <li><a href="section2.html">一周饮食清单</a></li>
        <li><a href="section3.html">采购清单</a></li>
        <li><a href="section4.html">锻炼计划</a></li>
        <li><a href="calendar.html">日历</a></li>
        <li><a href="budget.html">开销统计</a></li>
        <li><a href="weight.html" class="active">体重记录</a></li>
        <li><a href="calorie.html">热量统计</a></li>
      </ul>
    </nav>
  </aside>

  <div id="wrapper">
    <div class="inner">
      <a href="index.html" class="back-link">← 返回目录</a>
      <div class="page-content">
        <h2>📉 体重记录</h2>
        <p style="color: var(--hyperspace-fg-muted); font-size: 0.9375rem; margin-bottom: 1.5rem;">记录每日体重，数据保存在本机浏览器中。</p>

        <div class="card">
          <h3>身高（用于计算 BMI）</h3>
          <div class="weight-form">
            <label>
              <span>身高（cm）</span>
              <input type="number" id="heightInput" step="1" min="100" max="250" placeholder="例如 175">
            </label>
            <button type="button" id="heightSave" class="button">保存</button>
          </div>
          <p id="heightHint" style="color: var(--hyperspace-fg-muted); font-size: 0.8125rem; margin: 0.5rem 0 0;"></p>
        </div>

        <div class="card">
          <h3>添加记录</h3>
          <form id="weightForm" class="weight-form">
            <label>
              <span>日期</span>
              <select id="recordDate" required></select>
            </label>
            <label>
              <span>体重（kg）</span>
              <input type="number" id="recordWeight" step="0.1" min="20" max="300" placeholder="例如 70.5" required>
            </label>
            <button type="submit" class="button">添加记录</button>
          </form>
        </div>

        <div class="card">
          <h3>体重变化图</h3>
          <div class="chart-wrap"><canvas id="weightChart"></canvas></div>
          <p id="weightChartEmpty" class="chart-empty" style="display:none;">暂无足够数据，请先添加记录。</p>
        </div>

        <div class="card">
          <h3>BMI 变化图</h3>
          <div class="chart-wrap"><canvas id="bmiChart"></canvas></div>
          <p id="bmiChartEmpty" class="chart-empty" style="display:none;">请先填写并保存身高，并添加体重记录。</p>
        </div>

        <div class="card">
          <h3>历史记录 <button type="button" id="btnExportCsv" class="button" style="margin-left:0.75rem; font-size:0.875rem;">导出 CSV</button></h3>
          <div id="weightList" class="weight-list"></div>
          <p id="weightEmpty" class="weight-empty" style="display:none; color: var(--hyperspace-fg-muted); font-size: 0.9375rem;">暂无记录，添加第一条体重数据吧。</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      if (window.FitUser) window.FitUser.ensureCurrentUser();
      var KEY = 'fit-weight-records';
      var KEY_SEEDED = 'fit-weight-seeded';
      var KEY_HEIGHT = 'fit-height-cm';
      var form = document.getElementById('weightForm');
      var listEl = document.getElementById('weightList');
      var emptyEl = document.getElementById('weightEmpty');
      var dateInput = document.getElementById('recordDate');
      var weightInput = document.getElementById('recordWeight');
      var weightChartInst = null;
      var bmiChartInst = null;

      var SEED_DATA = [
        { date: '2026-02-20', weight: 113.7 },
        { date: '2026-02-21', weight: 113.5 },
        { date: '2026-02-23', weight: 112.6 },
        { date: '2026-02-24', weight: 112.3 },
        { date: '2026-02-25', weight: 112.4 },
        { date: '2026-02-26', weight: 112.7 },
        { date: '2026-02-27', weight: 112.3 },
        { date: '2026-03-01', weight: 110.8 },
        { date: '2026-03-02', weight: 110.6 }
      ];

      function todayStr() {
        var d = new Date();
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
      }

      function dateLabel(dateStr, today) {
        if (dateStr === today) return '今天';
        var d = new Date(dateStr + 'T12:00:00');
        var t = new Date(today + 'T12:00:00');
        var diff = Math.round((t - d) / 86400000);
        if (diff === 1) return '昨天';
        if (diff === 2) return '前天';
        var p = dateStr.split('-');
        return parseInt(p[1], 10) + '月' + parseInt(p[2], 10) + '日';
      }

      function fillDateOptions() {
        var today = todayStr();
        var select = document.getElementById('recordDate');
        select.innerHTML = '';
        for (var i = 0; i < 30; i++) {
          var d = new Date();
          d.setDate(d.getDate() - i);
          var str = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
          var opt = document.createElement('option');
          opt.value = str;
          opt.textContent = dateLabel(str, today);
          if (i === 0) opt.selected = true;
          select.appendChild(opt);
        }
      }

      function load() {
        try {
          var raw = localStorage.getItem(KEY);
          return raw ? JSON.parse(raw) : [];
        } catch (e) {
          return [];
        }
      }

      function save(records) {
        localStorage.setItem(KEY, JSON.stringify(records));
        if (window.FitUser) window.FitUser.saveWorkingToCurrentUser();
      }

      function getHeight() {
        var h = localStorage.getItem(KEY_HEIGHT);
        return h ? parseFloat(h, 10) : null;
      }

      function setHeight(cm) {
        if (cm && cm >= 100 && cm <= 250) {
          localStorage.setItem(KEY_HEIGHT, String(cm));
          if (window.FitUser) window.FitUser.saveWorkingToCurrentUser();
        }
      }

      function calcBmi(weightKg, heightCm) {
        if (!heightCm || heightCm <= 0) return null;
        var h = heightCm / 100;
        return Math.round(weightKg / (h * h) * 10) / 10;
      }

      function formatDate(str) {
        var p = str.split('-');
        if (p.length !== 3) return str;
        return p[0] + '年' + parseInt(p[1], 10) + '月' + parseInt(p[2], 10) + '日';
      }

      function render() {
        var records = load().sort(function(a, b) { return b.date.localeCompare(a.date); });
        var height = getHeight();
        if (records.length === 0) {
          listEl.innerHTML = '';
          listEl.style.display = 'none';
          emptyEl.style.display = 'block';
        } else {
          emptyEl.style.display = 'none';
          listEl.style.display = 'block';
          var hasBmi = height != null;
          var thead = '<tr><th>日期</th><th class="col-price">体重（kg）</th>' + (hasBmi ? '<th class="col-price">BMI</th>' : '') + '<th></th></tr>';
          listEl.innerHTML = '<table class="budget-table"><thead>' + thead + '</thead><tbody></tbody></table>';
          var tbody = listEl.querySelector('tbody');
          records.forEach(function(r) {
            var bmiCell = hasBmi ? '<td class="col-price">' + (calcBmi(r.weight, height) || '—') + '</td>' : '';
            var tr = document.createElement('tr');
            tr.innerHTML = '<td>' + formatDate(r.date) + '</td><td class="col-price">' + r.weight + '</td>' + bmiCell + '<td><button type="button" class="weight-del" data-date="' + r.date + '">删除</button></td>';
            tbody.appendChild(tr);
          });
          listEl.querySelectorAll('.weight-del').forEach(function(btn) {
            btn.addEventListener('click', function() {
              var date = btn.getAttribute('data-date');
              var records = load().filter(function(r) { return r.date !== date; });
              save(records);
              render();
              renderCharts();
            });
          });
        }
        renderCharts();
      }

      function renderCharts() {
        var records = load().sort(function(a, b) { return a.date.localeCompare(b.date); });
        var height = getHeight();
        var labels = records.map(function(r) {
          var p = r.date.split('-');
          return parseInt(p[1], 10) + '/' + parseInt(p[2], 10);
        });
        var weightData = records.map(function(r) { return r.weight; });
        var bmiData = height ? records.map(function(r) { return calcBmi(r.weight, height); }) : [];

        if (weightChartInst) { weightChartInst.destroy(); weightChartInst = null; }
        if (bmiChartInst) { bmiChartInst.destroy(); bmiChartInst = null; }

        var chartOpt = {
          responsive: true,
          maintainAspectRatio: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: '#9ca3af', maxTicksLimit: 10 } },
            y: { grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: '#9ca3af' } }
          }
        };

        var weightWrap = document.getElementById('weightChart').parentElement;
        var weightEmpty = document.getElementById('weightChartEmpty');
        if (records.length < 2) {
          weightWrap.style.display = 'none';
          weightEmpty.style.display = 'block';
        } else {
          weightWrap.style.display = 'block';
          weightEmpty.style.display = 'none';
          weightChartInst = new Chart(document.getElementById('weightChart'), {
            type: 'line',
            data: {
              labels: labels,
              datasets: [{ label: '体重(kg)', data: weightData, borderColor: '#60a5fa', backgroundColor: 'rgba(96,165,250,0.1)', fill: true, tension: 0.2 }]
            },
            options: chartOpt
          });
        }

        var bmiWrap = document.getElementById('bmiChart').parentElement;
        var bmiEmpty = document.getElementById('bmiChartEmpty');
        if (!height || records.length < 2) {
          bmiWrap.style.display = 'none';
          bmiEmpty.style.display = 'block';
          bmiEmpty.textContent = height ? '暂无足够数据，请先添加记录。' : '请先填写并保存身高，并添加体重记录。';
        } else {
          bmiWrap.style.display = 'block';
          bmiEmpty.style.display = 'none';
          bmiChartInst = new Chart(document.getElementById('bmiChart'), {
            type: 'line',
            data: {
              labels: labels,
              datasets: [{ label: 'BMI', data: bmiData, borderColor: '#34d399', backgroundColor: 'rgba(52,211,153,0.1)', fill: true, tension: 0.2 }]
            },
            options: chartOpt
          });
        }
      }

      fillDateOptions();

      var heightInput = document.getElementById('heightInput');
      var heightSave = document.getElementById('heightSave');
      var heightHint = document.getElementById('heightHint');
      if (getHeight()) heightInput.value = getHeight();
      heightSave.addEventListener('click', function() {
        var cm = parseFloat(heightInput.value, 10);
        if (isNaN(cm) || cm < 100 || cm > 250) { heightHint.textContent = '请输入 100～250 之间的身高（cm）。'; return; }
        setHeight(cm);
        heightHint.textContent = '已保存：当前身高 ' + cm + ' cm，用于计算 BMI。';
        render();
      });
      if (getHeight()) heightHint.textContent = '当前身高 ' + getHeight() + ' cm，用于计算 BMI。';

      if (load().length === 0 && !localStorage.getItem(KEY_SEEDED)) {
        save(SEED_DATA);
        localStorage.setItem(KEY_SEEDED, '1');
      }
      render();

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var date = dateInput.value.trim();
        var weight = parseFloat(weightInput.value, 10);
        if (isNaN(weight) || weight <= 0) return;
        var records = load();
        var same = records.findIndex(function(r) { return r.date === date; });
        if (same >= 0) records[same].weight = weight;
        else records.push({ date: date, weight: weight });
        save(records);
        render();
        weightInput.value = '';
        fillDateOptions();
      });

      document.getElementById('btnExportCsv').addEventListener('click', function() {
        var records = load();
        if (records.length === 0) return;
        records.sort(function(a, b) { return a.date.localeCompare(b.date); });
        var csv = '\uFEFF\u65E5\u671F,\u4F53\u91CD(kg)\n';
        records.forEach(function(r) { csv += r.date + ',' + r.weight + '\n'; });
        var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'fit-weight-' + new Date().toISOString().slice(0, 10) + '.csv';
        a.click();
        URL.revokeObjectURL(url);
      });

    })();

    (function() {
      var sidebar = document.getElementById('sidebar');
      var toggle = document.getElementById('sidebar-toggle');
      if (toggle && sidebar) {
        toggle.addEventListener('click', function() { sidebar.classList.toggle('open'); });
        document.addEventListener('click', function(e) {
          if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && !toggle.contains(e.target))
            sidebar.classList.remove('open');
        });
      }
    })();
  </script>
</body>
</html>
