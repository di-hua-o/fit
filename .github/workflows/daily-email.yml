name: Daily diet & workout mail

on:
  schedule:
    # 每天 22:00 UTC ≈ 北京时间 06:00（发「今天」）
    - cron: "0 22 * * *"
    # 每天 10:00 UTC ≈ 北京时间 18:00（发「明天」）
    - cron: "0 10 * * *"
  # 允许手动触发，方便测试；手动触发时两个 job 都会执行（今日+明日各一封）
  workflow_dispatch: {}

jobs:
  morning-today:
    # 定时触发：只在 0 22 * * * 这条 cron 下执行；
    # 手动触发：github.event_name != 'schedule'，条件为真，也会执行。
    if: github.event_name != 'schedule' || github.event.schedule == '0 22 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install nodemailer
        run: |
          npm init -y
          npm install nodemailer

      - name: Send today mail
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          # 可选：若配置 DAILY_EMAIL_ACCOUNTS，则忽略 MAIL_TO，使用 JSON 数组定义多账户及其基础数据
          MAIL_TO:   ${{ secrets.MAIL_TO }}
          ACCOUNTS_JSON: ${{ secrets.DAILY_EMAIL_ACCOUNTS }}
          PLAN_OFFSET_DAYS: "0"
          PLAN_LABEL: "今日"
        run: node scripts/daily-email.js

  evening-tomorrow:
    # 定时触发：只在 0 10 * * * 这条 cron 下执行；
    # 手动触发：github.event_name != 'schedule'，条件为真，也会执行。
    if: github.event_name != 'schedule' || github.event.schedule == '0 10 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install nodemailer
        run: |
          npm init -y
          npm install nodemailer

      - name: Send tomorrow mail
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
          ACCOUNTS_JSON: ${{ secrets.DAILY_EMAIL_ACCOUNTS }}
          PLAN_OFFSET_DAYS: "1"
          PLAN_LABEL: "明日"
        run: node scripts/daily-email.js

